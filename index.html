<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GEMAX Store</title>
    <style>
        :root{
            --bg:#F9F6F0;--c:#FFFFFF;--t:#1C1C1C;--ts:#666666;--a:#AA7C11;
            --g:#AA7C11;--gg:linear-gradient(135deg,#AA7C11,#D4AF37,#AA7C11);
            --bad:#dc2626;--pb:#AA7C11;--sb:rgba(170,124,17,0.05);
            --ib:#f5f1e8;--cib:#FFFFFF;--da:#ef4444;--su:#10b981;
            --or:#f59e0b;--bl:#3b82f6;--ca:#ef4444;
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
        }
        body.theme-obsidian{
            --bg:#121212;--c:#1a1a1a;--t:#FFFFFF;--ts:#a0a0a0;--a:#E5C158;
            --g:#E5C158;--gg:linear-gradient(135deg,#E5C158,#F3D673,#E5C158);
            --pb:#E5C158;--sb:rgba(229,193,88,0.08);--ib:#1e1e1e;--cib:#1a1a1a;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--t);min-height:100vh;padding-bottom:80px;transition:background 0.3s,color 0.3s}
        #loadingBar{position:fixed;top:0;left:0;height:3px;background:var(--gg);z-index:9999;width:0%;transition:width 0.3s}
        .hdr{background:var(--bg);padding:14px 20px;position:sticky;top:0;z-index:100;border-bottom:2px solid var(--pb);display:flex;align-items:center;justify-content:space-between;transition:background 0.3s}
        .logo{width:38px;height:38px;background:var(--gg);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#1a1a1a}
        .sn{font-weight:800;font-size:18px;background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .ub{padding:8px 20px;font-size:11px;color:var(--a);background:var(--sb);border-bottom:1px solid var(--pb)}
        .sbar{display:flex;align-items:center;background:var(--c);border:2px solid var(--pb);border-radius:12px;padding:10px 14px;gap:8px;margin:10px 20px}
        .sbar input{border:none;background:transparent;flex:1;font-size:14px;outline:none;color:var(--t)}
        .cats{display:flex;gap:6px;padding:10px 20px;overflow-x:auto;flex-wrap:wrap}
        .cc{padding:7px 14px;border-radius:18px;background:var(--c);border:1px solid var(--pb);font-size:11px;cursor:pointer;color:var(--ts);white-space:nowrap}
        .cc.active{background:var(--gg);color:#1a1a1a;font-weight:700}
        .gf{display:flex;gap:6px;padding:0 20px 10px;flex-wrap:wrap}
        .gc{padding:5px 12px;border-radius:14px;background:var(--c);border:1px solid var(--pb);font-size:10px;cursor:pointer;color:var(--ts)}
        .gc.active{background:rgba(170,124,17,0.2);color:var(--g);border-color:var(--g);font-weight:600}
        .pg{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:0 20px 20px}
        @media(min-width:768px){.pg{grid-template-columns:repeat(3,1fr)}}
        .pc{background:var(--c);border-radius:16px;overflow:hidden;cursor:pointer;border:1px solid var(--pb);position:relative;transition:transform 0.2s,border-color 0.2s}
        .pc:active{transform:scale(0.98)}
        .pi{width:100%;height:160px;object-fit:cover;display:block}
        .pc.sold .pi{filter:brightness(0.4) grayscale(0.6)}
        .sbad{position:absolute;top:8px;right:8px;background:var(--bad);color:#fff;padding:3px 10px;border-radius:6px;font-size:9px;font-weight:700;z-index:2}
        .wbtn{position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.4);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3}
        .wbtn.liked{background:var(--gg);color:#1a1a1a}
        .pinfo{padding:10px}.pn{font-weight:600;font-size:13px}.pp{font-weight:700;font-size:15px;color:var(--g)}
        .btn{padding:10px 18px;border-radius:12px;border:none;font-size:13px;font-weight:600;cursor:pointer}
        .btn-p{background:var(--gg);color:#1a1a1a}.btn-s{background:var(--ib);color:var(--t);border:1px solid var(--pb)}.btn-d{background:var(--da);color:#fff}.btn-g{background:var(--su);color:#fff}.btn-b{background:var(--bl);color:#fff}.btn-c{background:var(--ca);color:#fff}
        .btn-sm{padding:7px 12px;font-size:11px;border-radius:10px}.btn-xs{padding:3px 8px;font-size:9px;border-radius:7px}
        .bn{position:fixed;bottom:0;left:0;right:0;background:var(--bg);display:flex;justify-content:space-around;padding:8px 0 12px;z-index:95;border-top:2px solid var(--pb)}
        .ni{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:var(--ts);font-size:9px;background:none;border:none}
        .ni.active{color:var(--g);font-weight:700}.ni .ic{font-size:18px}
        .sec{display:none;min-height:50vh}.sec.active{display:block}
        .ci{display:flex;gap:10px;background:var(--cib);border-radius:12px;padding:10px;margin:0 20px 8px;align-items:center;border:1px solid var(--pb)}
        .cii{width:55px;height:55px;border-radius:10px;object-fit:cover}.cinfo{flex:1;font-size:12px}
        .qb{width:28px;height:28px;border-radius:8px;border:1px solid var(--pb);background:var(--c);cursor:pointer;font-size:13px;color:var(--g);display:flex;align-items:center;justify-content:center}
        .ct{background:var(--sb);border:1px solid var(--pb);border-radius:14px;padding:16px;margin:14px 20px;display:flex;justify-content:space-between;font-weight:700}
        .oc{background:var(--c);border-radius:14px;padding:14px;margin:0 20px 10px;border:1px solid var(--pb);font-size:12px}
        .oh{display:flex;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:4px}
        .sb2{padding:3px 8px;border-radius:14px;font-size:9px;font-weight:600}
        .sp{background:rgba(245,158,11,0.15);color:var(--or);border:1px solid var(--or)}
        .spa{background:rgba(16,185,129,0.15);color:var(--su);border:1px solid var(--su)}
        .sbl{background:rgba(59,130,246,0.15);color:var(--bl);border:1px solid var(--bl)}
        .sca{background:rgba(239,68,68,0.15);color:var(--ca);border:1px solid var(--ca)}
        .mo{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:flex-end;justify-content:center}
        .mo.active{display:flex}.ms{background:var(--c);width:100%;max-width:500px;border-radius:22px 22px 0 0;max-height:85vh;overflow-y:auto;padding-bottom:20px;border-top:3px solid var(--g);animation:slideUp 0.3s}
        @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        .mg{display:flex;overflow-x:auto}.mg img{width:100%;max-height:300px;object-fit:cover;flex-shrink:0}
        .mc{padding:16px}.ma{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
        .ao{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:300;display:none;align-items:center;justify-content:center}
        .ao.active{display:flex}.ap{background:var(--c);border-radius:18px;width:95%;max-width:900px;max-height:85vh;overflow-y:auto;padding:18px;border:2px solid var(--pb)}
        .ah{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--pb)}
        .at{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
        .atb{padding:7px 12px;border-radius:16px;border:1px solid var(--pb);background:var(--c);cursor:pointer;font-size:11px;color:var(--ts)}
        .atb.active{background:var(--gg);color:#1a1a1a;font-weight:700}
        .asec{display:none}.asec.active{display:block}
        .fg{margin-bottom:12px}.fg label{display:block;font-weight:600;margin-bottom:3px;font-size:11px;color:var(--g)}
        .fg input,.fg textarea,.fg select{width:100%;padding:9px 12px;border-radius:10px;border:2px solid var(--pb);background:var(--ib);font-size:12px;color:var(--t);outline:none}
        .fg textarea{min-height:50px;resize:vertical}.fr{display:flex;gap:8px;flex-wrap:wrap}.fr .fg{flex:1;min-width:100px}
        .fua{border:2px dashed var(--pb);border-radius:12px;padding:18px;text-align:center;cursor:pointer;margin-bottom:10px;background:var(--sb);color:var(--ts)}
        .pt{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
        .pti{position:relative;width:55px;height:55px}.pti img{width:55px;height:55px;border-radius:8px;object-fit:cover;border:2px solid var(--pb)}
        .rt{position:absolute;top:-5px;right:-5px;background:var(--da);color:#fff;border:none;width:20px;height:20px;border-radius:50%;font-size:10px;cursor:pointer}
        .api{display:flex;align-items:center;gap:8px;padding:10px;background:var(--cib);border-radius:12px;margin-bottom:6px;flex-wrap:wrap;border:1px solid var(--pb);font-size:11px}
        .api img{width:45px;height:45px;border-radius:8px;object-fit:cover}.apii{flex:1;min-width:100px}
        .catch{display:inline-block;background:var(--sb);border:1px solid var(--pb);padding:5px 10px;border-radius:8px;margin:2px;font-size:11px;color:var(--t)}
        .catch button{margin-left:3px;background:none;border:none;color:var(--da);cursor:pointer;font-weight:700}
        .sg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
        .sc{background:var(--sb);padding:14px;border-radius:14px;text-align:center;border:1px solid var(--pb)}.sc .sv{font-size:22px;font-weight:700;color:var(--g)}.sc .sl{font-size:9px;color:var(--ts)}
        .tp{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:350;display:none;align-items:center;justify-content:center}.tp.active{display:flex}
        .tc{background:var(--c);border-radius:18px;padding:20px;width:90%;max-width:380px;border:2px solid var(--pb)}
        .to2{padding:10px 14px;border-radius:12px;margin-bottom:5px;cursor:pointer;border:2px solid var(--pb);font-weight:600;font-size:12px;color:var(--t)}
        .to2.selected{border-color:var(--g);background:var(--sb)}
        .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:12px;z-index:500;opacity:0;transition:opacity 0.3s;pointer-events:none;border:1px solid var(--pb)}.toast.show{opacity:1}
        .es{text-align:center;padding:40px 20px;color:var(--ts)}.es .ic2{font-size:40px;margin-bottom:10px;display:block}
        hr{border:none;border-top:1px solid var(--pb);margin:14px 0}
    </style>
</head>
<body>

<div id="loadingBar"></div>

<div class="hdr">
    <div><span class="logo">💎</span><span class="sn">GEMAX</span></div>
    <div>
        <button class="btn btn-sm btn-s" id="tbtn">🎨</button>
        <button class="btn btn-sm btn-s" id="abtn" style="display:none">⚙️</button>
    </div>
</div>
<div class="ub"><span id="ug">👤 Welcome</span></div>
<div class="sbar"><span>🔍</span><input type="text" placeholder="Search..." id="si"></div>

<div class="sec active" id="sec-home">
    <div class="cats" id="ctabs"></div>
    <div class="gf" id="gfilt"></div>
    <p style="padding:10px 20px;font-weight:700;color:var(--g)">✦ Products</p>
    <div class="pg" id="pgrid"></div>
</div>

<div class="sec" id="sec-cart">
    <p style="padding:14px 20px;font-weight:700;color:var(--g)">🛒 Your Cart</p>
    <div id="citems"></div>
    <div class="ct" id="ctot" style="display:none"><span>Total</span><span id="tpr">0</span></div>
    <button class="btn btn-p" id="cobtn" style="display:none;margin:0 20px;width:calc(100% - 40px)">✦ Place Order</button>
    <div class="es" id="cempty"><span class="ic2">🛒</span><p>Your cart is empty</p></div>
</div>

<div class="sec" id="sec-wish">
    <p style="padding:14px 20px;font-weight:700;color:var(--g)">❤️ Your Wishlist</p>
    <div class="pg" id="wgrid"></div>
    <div class="es" id="wempty"><span class="ic2">💎</span><p>No favorites yet</p></div>
</div>

<div class="sec" id="sec-orders">
    <p style="padding:14px 20px;font-weight:700;color:var(--g)">📋 Your Orders</p>
    <div id="olist" style="padding:0 20px"></div>
    <div class="es" id="oempty"><span class="ic2">📦</span><p>No orders yet</p></div>
</div>

<div class="bn">
    <button class="ni active" data-sec="home"><span class="ic">🏠</span>Home</button>
    <button class="ni" data-sec="cart"><span class="ic">🛒</span><span id="cBadge" style="background:var(--bad);color:#fff;font-size:8px;padding:1px 5px;border-radius:6px;display:none">0</span> Cart</button>
    <button class="ni" data-sec="wish"><span class="ic">❤️</span>Wish</button>
    <button class="ni" data-sec="orders"><span class="ic">📋</span>Orders</button>
</div>

<div class="mo" id="pModal"><div class="ms"><button class="btn btn-sm btn-s" style="position:sticky;top:10px;float:right;margin:10px;z-index:10" id="cmBtn">✕</button><div class="mg" id="mGal"></div><div class="mc"><p id="mCat" style="font-size:9px;color:var(--ts)"></p><h2 id="mName" style="font-size:18px;margin:3px 0"></h2><p id="mPrice" style="font-size:18px;color:var(--g)"></p><p id="mDesc" style="color:var(--ts);margin:8px 0;font-size:12px"></p><p id="mStock" style="color:var(--g);font-size:11px"></p><div class="ma"><button class="btn btn-p" id="mAdd">Add to Cart</button><button class="btn btn-g" id="mBuy">Buy Now</button></div><button class="btn btn-s" style="width:100%;margin-top:6px" id="mBack">← Continue Shopping</button></div></div></div>

<div class="tp" id="tPopup"><div class="tc"><h3 style="margin-bottom:14px;color:var(--g)">🎨 Theme</h3><div class="to2 selected" data-theme="ivory">🤍 Ivory (Light)</div><div class="to2" data-theme="obsidian">🌑 Obsidian (Dark)</div><button class="btn btn-p" style="width:100%;margin-top:10px" id="ctBtn">✅ Apply</button></div></div>

<div class="ao" id="aOverlay"><div class="ap"><div class="ah"><h2 style="color:var(--g)">⚙️ Admin</h2><button class="btn btn-sm btn-d" id="caBtn">✕</button></div><div class="at"><button class="atb active" data-atab="dash">Dashboard</button><button class="atb" data-atab="prods">Products</button><button class="atb" data-atab="ords">Orders</button></div>
<div class="asec active" id="a-dash"><div class="sg" id="dStats"></div></div>
<div class="asec" id="a-prods"><div class="fg"><label>Name *</label><input id="apn"></div><div class="fr"><div class="fg"><label>Category</label><select id="apc"></select></div><div class="fg"><label>Gender</label><select id="apg"><option>Male</option><option>Female</option><option>Unisex</option></select></div></div><div class="fr"><div class="fg"><label>Price (Birr) *</label><input type="number" id="app"></div><div class="fg"><label>Stock</label><input type="number" id="aps" value="1"></div></div><div class="fg"><label>Description</label><textarea id="apd"></textarea></div><div class="fg"><label>📷 Photos (max 3)</label><div class="fua" id="pdz"><p>📷 Click to upload</p></div><input type="file" id="api2" accept="image/*" multiple style="display:none"><div class="pt" id="ppv"></div></div><button class="btn btn-p" id="apBtn">➕ Add Product</button><hr><h4 style="color:var(--g)">📁 Categories</h4><div class="fr"><div class="fg"><input id="ncn" placeholder="New category"></div><button class="btn btn-p" id="acBtn">➕ Add</button></div><div id="clist"></div><hr><h4 style="color:var(--g)">📦 Manage Products</h4><div id="aplist"></div></div>
<div class="asec" id="a-ords"><div id="aolist"></div></div>
</div></div>
<div class="toast" id="toast"></div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
// CONFIG
const API='https://gemax-backend.onrender.com',AD=[7715442708],PH='+251990066832',PN='Biruk',SU='gem_core';
let P=[],C=[],W=[],O=[],CAT=['Bags','Clothes','Jewelry','Perfumes','Electronics','Others'];
let U={n:'',u:'',phone:'',tid:null,isAdmin:false},theme='ivory',isAO=false,cat='All',gen='All',pP=[],aT=null,cM=null;

// UTILS
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500)}
function fP(id){return P.find(p=>p.id===id)}
function gImg(p){if(!p||!p.images||!p.images.length)return'https://placehold.co/400x400/D4AF37/0B2E1E?text=No+Image';const i=p.images[0];return i.startsWith('http')||i.startsWith('data:')?i:API+'/static/'+i}
function getK(k){return'gc_'+k+'_'+(U.tid||'anonymous')}
function save(k,v){localStorage.setItem(getK(k),JSON.stringify(v))}
function load(k,d){const v=localStorage.getItem(getK(k));return v?JSON.parse(v):d}
function showLoading(){document.getElementById('loadingBar').style.width='100%'}
function hideLoading(){setTimeout(()=>document.getElementById('loadingBar').style.width='0%',300)}

// USER
function detectUser(){if(window.Telegram&&window.Telegram.WebApp){try{const tg=window.Telegram.WebApp;tg.ready();const u=tg.initDataUnsafe?.user;if(u){U.tid=u.id;U.n=u.first_name+(u.last_name?' '+u.last_name:'');U.u=u.username?'@'+u.username:'';U.isAdmin=AD.includes(u.id);save('user',U);return true}}catch(e){}}const s=load('user',{});if(s.tid)U=s;U.phone=load('phone','');return!!U.tid}
function uUB(){const g=document.getElementById('ug');g.textContent=(U.u||U.n||'Welcome')+(U.isAdmin?' 🔐':'');const ab=document.getElementById('abtn');ab.style.display=U.isAdmin?'inline-block':'none'}

// RENDER
function rP(){const s=document.getElementById('si').value.toLowerCase();const f=P.filter(p=>{if(p.is_hidden)return false;if(cat!=='All'&&p.category!==cat)return false;if(gen!=='All'&&p.gender!==gen)return false;if(s&&p.name.toLowerCase().indexOf(s)===-1)return false;return true});let h='';f.forEach(p=>{const lk=W.includes(p.id);h+=`<div class="pc${p.is_sold?' sold':''}" data-pid="${p.id}"><img src="${gImg(p)}" class="pi" onerror="this.src='https://placehold.co/400x400/D4AF37/0B2E1E?text=Image'">${p.is_sold?'<span class="sbad">SOLD</span>':''}<button class="wbtn${lk?' liked':''}" data-wid="${p.id}">${lk?'❤️':'🤍'}</button><div class="pinfo"><p style="font-size:9px;color:var(--ts)">${p.category} · ${p.gender}</p><p class="pn">${p.name}</p><p class="pp">${p.price.toLocaleString()} Birr</p><p style="font-size:9px;color:var(--g)">${p.is_sold?'Sold Out':'Stock: '+p.stock}</p></div></div>`});document.getElementById('pgrid').innerHTML=h||'<div class="es"><span class="ic2">💎</span><p>No products</p></div>';document.querySelectorAll('#pgrid .pc').forEach(cd=>{cd.onclick=function(e){if(e.target.classList.contains('wbtn'))return;const p=fP(parseInt(this.dataset.pid));if(p&&!p.is_sold)oP(p.id)}});document.querySelectorAll('#pgrid .wbtn').forEach(btn=>{btn.onclick=function(e){e.stopPropagation();tW(parseInt(this.dataset.wid))}})}
function rW(){const it=P.filter(p=>W.includes(p.id));document.getElementById('wgrid').innerHTML=it.length?it.map(p=>`<div class="pc${p.is_sold?' sold':''}"><img src="${gImg(p)}" class="pi"><div class="pinfo"><p style="font-size:9px;color:var(--ts)">${p.category} · ${p.gender}</p><p class="pn">${p.name}</p><p class="pp">${p.price.toLocaleString()} Birr</p></div></div>`).join(''):'';document.getElementById('wempty').style.display=it.length?'none':'block'}
function oP(id){const p=fP(id);if(!p||p.is_sold)return;cM=p;let gal='';if(p.images&&p.images.length){p.images.forEach(img=>{gal+=`<img src="${img.startsWith('http')||img.startsWith('data:')?img:API+'/static/'+img}" onerror="this.src='https://placehold.co/400x400/D4AF37/0B2E1E?text=Image'">`})}else{gal='<img src="https://placehold.co/400x400/D4AF37/0B2E1E?text=No+Image">'}document.getElementById('mGal').innerHTML=gal;document.getElementById('mCat').textContent=p.category+' · '+p.gender;document.getElementById('mName').textContent=p.name;document.getElementById('mPrice').textContent=p.price.toLocaleString()+' Birr';document.getElementById('mDesc').textContent=p.description||'';document.getElementById('mStock').textContent=p.stock>0?(p.stock<=3?'⚠️ Only '+p.stock+' left!':'✅ In Stock'):'❌ Sold Out';document.getElementById('mAdd').textContent=p.stock<=0?'SOLD OUT':'Add to Cart';document.getElementById('mAdd').style.opacity=p.stock<=0?'0.5':'1';document.getElementById('mAdd').onclick=()=>aTC(p.id);document.getElementById('mBuy').style.display=p.stock<=0?'none':'inline-block';document.getElementById('mBuy').onclick=()=>bN();document.getElementById('pModal').classList.add('active')}
function clM(){document.getElementById('pModal').classList.remove('active');cM=null}
function aTC(id){const p=fP(id);if(!p||p.is_sold||p.stock<=0)return;const ex=C.find(c=>c.id===id);if(ex&&ex.qty>=p.stock){toast('⚠️ Stock limit!');return}ex?ex.qty++:C.push({id,qty:1});save('cart',C);toast('🛒 Added!');uCB()}
function uCB(){const t=C.reduce((s,c)=>s+c.qty,0);const b=document.getElementById('cBadge');if(t>0){b.textContent=t;b.style.display='inline'}else{b.style.display='none'}}
function rC(){if(C.length===0){document.getElementById('citems').innerHTML='';document.getElementById('ctot').style.display='none';document.getElementById('cobtn').style.display='none';document.getElementById('cempty').style.display='block';return}document.getElementById('cempty').style.display='none';document.getElementById('ctot').style.display='flex';document.getElementById('cobtn').style.display='block';let t=0,h='';C.forEach(c=>{const p=fP(c.id);if(!p)return;t+=p.price*c.qty;h+=`<div class="ci"><img src="${gImg(p)}" class="cii"><div class="cinfo"><b>${p.name}</b><br>${p.price.toLocaleString()} Birr × ${c.qty}<div style="margin-top:4px"><button class="qb" onclick="chQ(${c.id},-1)">−</button> ${c.qty} <button class="qb" onclick="chQ(${c.id},1)">+</button> <button class="btn btn-xs btn-d" onclick="rFC(${c.id})">🗑️</button></div></div></div>`});document.getElementById('citems').innerHTML=h;document.getElementById('tpr').textContent=t.toLocaleString()+' Birr'}
window.chQ=function(id,d){const c=C.find(x=>x.id===id);if(!c)return;const p=fP(id);if(d>0&&p&&c.qty>=p.stock){toast('⚠️ Stock limit!');return}c.qty+=d;if(c.qty<=0)C=C.filter(x=>x.id!==id);save('cart',C);rC();uCB()}
window.rFC=function(id){C=C.filter(c=>c.id!==id);save('cart',C);rC();uCB()}
window.checkout=function(){if(C.length===0)return;if(!U.u||U.u===''){const ph=prompt('📱 Your phone number:');if(!ph||!ph.trim()){toast('⚠️ Required!');return}U.phone=ph.trim();save('phone',U.phone);U.u=U.phone}const items=C.map(c=>{const p=fP(c.id);return{product_id:c.id,name:p?p.name:'Unknown',quantity:c.qty,price:p?p.price:0}});const total=items.reduce((s,i)=>s+i.price*i.quantity,0);showLoading();fetch(API+'/api/orders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({customer_id:U.tid||0,customer_name:U.n||'Customer',customer_username:U.u,items,payment_method:'Telebirr'})}).then(r=>r.json()).then(res=>{hideLoading();if(res.order_id){if(window.Telegram&&window.Telegram.WebApp){window.Telegram.WebApp.sendData(JSON.stringify({type:'new_order',order:{id:res.order_id,customer_name:U.n,customer_username:U.u,customer_id:U.tid,items,total}}))}C=[];save('cart',[]);uCB();rC();toast('✅ Order placed!');swS('orders');alert('💎 ORDER PLACED!\n\n👤 '+(U.u)+'\n💰 '+total.toLocaleString()+' Birr\n\n💳 Telebirr:\n📱 '+PH+'\n👤 '+PN+'\n\n📞 @'+SU);lP()}else{toast('❌ Failed')}}).catch(e=>{hideLoading();toast('❌ Network error')})}
window.bN=function(){if(!cM||cM.stock<=0)return;aTC(cM.id);clM();swS('cart');setTimeout(()=>window.checkout(),500)}
function tW(id){const i=W.indexOf(id);i>-1?W.splice(i,1):W.push(id);save('wish',W);rP();rW();if(cM&&cM.id===id)oP(cM.id)}
function rO(){const mo=O.filter(o=>{if(U.tid&&String(o.customer_id)===String(U.tid))return true;if(U.u&&o.customer_username===U.u)return true;return false});document.getElementById('olist').innerHTML=mo.length?mo.map(o=>{let sc='sp',sl='PENDING';if(o.status==='confirmed'){sc='spa';sl='CONFIRMED'}else if(o.status==='paid'){sc='sbl';sl='PAID'}else if(o.status==='cancelled'){sc='sca';sl='CANCELLED'}return`<div class="oc"><div class="oh"><b>#${o.id}</b><span class="sb2 ${sc}">${sl}</span></div><p>${o.items.map(i=>i.name+' ×'+i.quantity).join(', ')}</p><p><b style="color:var(--g)">${o.total.toLocaleString()} Birr</b></p></div>`}).join(''):'';document.getElementById('oempty').style.display=mo.length?'none':'block'}
function swS(s){document.querySelectorAll('.sec').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.ni').forEach(e=>e.classList.remove('active'));document.getElementById('sec-'+s).classList.add('active');const n=document.querySelector('[data-sec="'+s+'"]');if(n)n.classList.add('active');if(s==='cart')rC();if(s==='wish')rW();if(s==='home')rP();if(s==='orders'){showLoading();lO();setTimeout(hideLoading,800)}}

// API
function lP(){showLoading();fetch(API+'/api/products').then(r=>r.json()).then(d=>{P=d.products||[];rP();rW();if(isAO)lAP();hideLoading()}).catch(e=>{hideLoading()})}
function lO(){fetch(API+'/api/orders?customer_id='+(U.tid||0)).then(r=>r.json()).then(d=>{O=d||[];rO();if(isAO)lAO()}).catch(e=>{})}

// ADMIN
window.oAP=function(){if(!U.isAdmin){toast('❌ Unauthorized');return}const pw=prompt('🔐 Admin password:');if(pw!=='sadmin'){toast('❌ Wrong!');return}showLoading();fetch(API+'/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})}).then(r=>r.json()).then(d=>{hideLoading();if(d.token){aT=d.token;isAO=true;document.getElementById('aOverlay').classList.add('active');sAT('dash');lP();lO();toast('🔐 Welcome!')}else{toast('❌ Wrong!')}}).catch(()=>{hideLoading();toast('❌ Error')})}
window.cAP=function(){document.getElementById('aOverlay').classList.remove('active');isAO=false}
function sAT(t){document.querySelectorAll('.atb').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.asec').forEach(e=>e.classList.remove('active'));const tb=document.querySelector('[data-atab="'+t+'"]');if(tb)tb.classList.add('active');const s=document.getElementById('a-'+t);if(s)s.classList.add('active');if(t==='dash'){const uq=[...new Set(O.map(o=>o.customer_id))];document.getElementById('dStats').innerHTML=`<div class="sc"><div class="sv">${P.length}</div><div class="sl">📦 Products</div></div><div class="sc"><div class="sv">${O.length}</div><div class="sl">📋 Orders</div></div><div class="sc"><div class="sv">${O.filter(o=>o.status==='pending').length}</div><div class="sl">⏳ Pending</div></div><div class="sc"><div class="sv">${uq.length}</div><div class="sl">👥 Customers</div></div>`}if(t==='prods'){lAP();document.getElementById('apc').innerHTML=CAT.map(c=>`<option>${c}</option>`).join('');document.getElementById('pdz').onclick=()=>document.getElementById('api2').click();document.getElementById('api2').onchange=function(e){const files=Array.from(e.target.files).slice(0,3);pP=[];files.forEach(f=>{const r=new FileReader();r.onload=ev=>{pP.push(ev.target.result);rPP()};r.readAsDataURL(f)});this.value=''};rCL()}if(t==='ords')lAO()}
function rPP(){document.getElementById('ppv').innerHTML=pP.map((p,i)=>`<div class="pti"><img src="${p}"><button class="rt" onclick="rPP2(${i})">✕</button></div>`).join('')}
window.rPP2=function(i){pP.splice(i,1);rPP()}
function rCL(){document.getElementById('clist').innerHTML=CAT.map((c,i)=>`<span class="catch">${c} <button onclick="dCat(${i})">✕</button></span>`).join('')}
window.aCat=function(){const n=document.getElementById('ncn').value.trim();if(!n||CAT.includes(n)){toast('⚠️ Invalid');return}CAT.push(n);save('cat',CAT);document.getElementById('ncn').value='';rCL();document.getElementById('apc').innerHTML=CAT.map(c=>`<option>${c}</option>`).join('');rCats();toast('✅ Added!')}
window.dCat=function(i){if(!confirm('Delete?'))return;CAT.splice(i,1);save('cat',CAT);rCL();document.getElementById('apc').innerHTML=CAT.map(c=>`<option>${c}</option>`).join('');rCats();toast('🗑️ Deleted')}
function aP(){const n=document.getElementById('apn').value.trim(),pr=parseInt(document.getElementById('app').value);if(!n||!pr){toast('⚠️ Name & price!');return}const np={name:n,category:document.getElementById('apc').value,gender:document.getElementById('apg').value,price:pr,description:document.getElementById('apd').value,images:pP.length?pP.slice():['https://placehold.co/400x400/D4AF37/0B2E1E?text='+encodeURIComponent(n.substring(0,10))],stock:parseInt(document.getElementById('aps').value)||1,is_sold:false,is_hidden:false};showLoading();fetch(API+'/api/products',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+aT},body:JSON.stringify(np)}).then(()=>{hideLoading();toast('✅ Added!');document.getElementById('apn').value='';document.getElementById('app').value='';document.getElementById('apd').value='';document.getElementById('aps').value='1';pP=[];document.getElementById('ppv').innerHTML='';lP()}).catch(()=>{hideLoading();toast('❌ Error')})}
function lAP(){let h='';P.forEach(p=>{h+=`<div class="api"><img src="${gImg(p)}"><div class="apii"><b>${p.name}</b> ${p.is_sold?'🔴':''}<div>${p.category} · ${p.gender} · ${p.price.toLocaleString()} Birr</div><div>Stock: <input type="number" value="${p.stock}" id="si${p.id}" style="width:45px;border:1px solid var(--pb);background:var(--ib);color:var(--t);padding:2px 4px;border-radius:6px"> <button class="btn btn-xs btn-s" onclick="uS(${p.id})">Update</button> <button class="btn btn-xs btn-s" onclick="qS(${p.id},5)">+5</button></div></div><button class="btn btn-xs ${p.is_sold?'btn-g':'btn-s'}" onclick="tS(${p.id})">${p.is_sold?'Available':'Sell'}</button> <button class="btn btn-xs btn-d" onclick="dP(${p.id})">🗑️</button></div>`});document.getElementById('aplist').innerHTML=h||'<p style="text-align:center;padding:20px">No products.</p>'}
window.uS=function(id){const inp=document.getElementById('si'+id);if(inp){showLoading();fetch(API+'/api/products/'+id,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+aT},body:JSON.stringify({stock:Math.max(0,parseInt(inp.value)||0),is_sold:(parseInt(inp.value)||0)<=0})}).then(()=>{hideLoading();lP()}).catch(()=>{hideLoading();toast('❌ Error')})}}
window.qS=function(id,add){showLoading();fetch(API+'/api/products/'+id,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+aT},body:JSON.stringify({stock_increment:add})}).then(()=>{hideLoading();lP();toast('📦 +'+add)})}
window.tS=function(id){const p=fP(id);if(p){showLoading();fetch(API+'/api/products/'+id,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+aT},body:JSON.stringify({is_sold:!p.is_sold})}).then(()=>{hideLoading();lP()})}}
window.dP=function(id){if(!confirm('Delete?'))return;showLoading();fetch(API+'/api/products/'+id,{method:'DELETE',headers:{'Authorization':'Bearer '+aT}}).then(()=>{hideLoading();lP();toast('🗑️ Deleted')})}
function lAO(){if(!aT){document.getElementById('aolist').innerHTML='<p style="text-align:center;padding:20px">Login required.</p>';return}showLoading();fetch(API+'/api/orders?all=true',{headers:{'Authorization':'Bearer '+aT}}).then(r=>r.json()).then(orders=>{hideLoading();let h='';orders.forEach(o=>{let sb='sp',sl='PENDING';if(o.status==='confirmed'){sb='spa';sl='CONFIRMED'}else if(o.status==='paid'){sb='sbl';sl='PAID'}else if(o.status==='cancelled'){sb='sca';sl='CANCELLED'}h+=`<div class="oc" style="margin:0 0 8px"><div class="oh"><b>#${o.id}</b><span class="sb2 ${sb}">${sl}</span></div><p>👤 ${o.customer_name} (${o.customer_username})</p><p>${o.items.map(i=>i.name+' ×'+i.quantity).join(', ')}</p><p><b style="color:var(--g)">${o.total.toLocaleString()} Birr</b></p><div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap"><button class="btn btn-xs btn-g" onclick="uOS('${o.id}','confirmed')">✅ Confirm</button><button class="btn btn-xs btn-b" onclick="uOS('${o.id}','paid')">💳 Paid</button><button class="btn btn-xs btn-c" onclick="uOS('${o.id}','cancelled')">❌ Cancel</button><button class="btn btn-xs btn-s" onclick="window.open('https://t.me/${o.customer_username.replace('@','')}')">📞 Contact</button></div></div>`});document.getElementById('aolist').innerHTML=h||'<p style="text-align:center;padding:20px">No orders.</p>'})}
window.uOS=function(id,s){showLoading();fetch(API+'/api/orders/'+id+'/status',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+aT},body:JSON.stringify({status:s})}).then(()=>{hideLoading();lO();toast('✦ Updated!')})}

// THEME
function aTH(){document.body.classList.remove('theme-obsidian');if(theme==='obsidian')document.body.classList.add('theme-obsidian');document.querySelectorAll('#tPopup .to2').forEach(e=>e.classList.remove('selected'));const el=document.querySelector('#tPopup .to2[data-theme="'+theme+'"]');if(el)el.classList.add('selected');save('theme',theme)}
function rCats(){const all=['All',...CAT];let h='';all.forEach(c=>{h+=`<span class="cc${c===cat?' active':''}" data-cat="${c}">${c}</span>`});document.getElementById('ctabs').innerHTML=h;document.querySelectorAll('#ctabs .cc').forEach(el=>{el.onclick=function(){cat=this.dataset.cat;rCats();rP()}})}
function rGF(){const g=['All','Male','Female','Unisex'],l={All:'🌐 All',Male:'👦 Male',Female:'👧 Female',Unisex:'💜 Unisex'};let h='';g.forEach(g2=>{h+=`<span class="gc${g2===gen?' active':''}" data-gen="${g2}">${l[g2]}</span>`});document.getElementById('gfilt').innerHTML=h;document.querySelectorAll('#gfilt .gc').forEach(el=>{el.onclick=function(){gen=this.dataset.gen;rGF();rP()}})}

// INIT
function init(){const sc=load('cat',null);if(sc&&sc.length)CAT=sc;detectUser();C=load('cart',[]);W=load('wish',[]);theme=load('theme','ivory');aTH();uUB();rCats();rGF();uCB();swS('home');document.getElementById('si').addEventListener('input',rP);document.getElementById('tbtn').onclick=()=>document.getElementById('tPopup').classList.add('active');document.getElementById('ctBtn').onclick=()=>document.getElementById('tPopup').classList.remove('active');document.querySelectorAll('#tPopup .to2').forEach(o=>{o.onclick=function(){theme=this.dataset.theme;aTH()}});document.getElementById('abtn').onclick=window.oAP;document.getElementById('caBtn').onclick=window.cAP;document.getElementById('cmBtn').onclick=clM;document.getElementById('mBack').onclick=()=>{clM();swS('home')};document.getElementById('cobtn').onclick=window.checkout;document.getElementById('acBtn').onclick=window.aCat;document.getElementById('apBtn').onclick=aP;document.querySelectorAll('.ni').forEach(i=>{i.onclick=function(){swS(this.dataset.sec)}});document.querySelectorAll('.atb').forEach(t=>{t.onclick=function(){sAT(this.dataset.atab)}});document.getElementById('aOverlay').onclick=function(e){if(e.target===this)window.cAP()};document.getElementById('tPopup').onclick=function(e){if(e.target===this)this.classList.remove('active')};document.getElementById('pModal').onclick=function(e){if(e.target===this)clM()};lP();lO()}
init();
</script>
</body>
</html>
